name: Recover Chat Mobile Token

on:
  workflow_dispatch:
    inputs:
      chat_revision:
        description: Optional gateway-chat-platform revision to redeploy after token recovery
        required: false
        type: string

concurrency:
  group: gateway-production-deploy
  cancel-in-progress: false

jobs:
  recover:
    runs-on:
      - self-hosted
      - gateway
    steps:
      - uses: actions/checkout@v4
      - name: Sync host control-plane checkout
        run: |
          if [ ! -d /opt/gateway-control-plane/.git ]; then
            sudo git clone https://github.com/goblinsan/gateway-control-plane.git /opt/gateway-control-plane
            sudo chown -R "$USER":"$(id -gn)" /opt/gateway-control-plane
          fi
          git -C /opt/gateway-control-plane merge --abort || true
          git -C /opt/gateway-control-plane fetch --all --tags --prune
          git -C /opt/gateway-control-plane checkout --force "${GITHUB_SHA}"
      - name: Recover mobile tokens from existing containers
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import subprocess

          env_path = Path('/srv/apps/gateway-chat-platform/shared/chat-api.env')
          env_path.parent.mkdir(parents=True, exist_ok=True)
          existing = env_path.read_text() if env_path.exists() else ''

          def parse_env(text):
              values = {}
              for line in text.splitlines():
                  if not line or line.startswith('#') or '=' not in line:
                      continue
                  key, value = line.split('=', 1)
                  values[key] = value.strip().strip('"')
              return values

          def is_present(value):
              return bool((value or '').strip().strip('"').strip("'"))

          def split_tokens(value):
              return [token.strip() for token in (value or '').split(',') if token.strip()]

          def add_token(tokens, token):
              normalized = (token or '').strip().strip('"').strip("'")
              if normalized and normalized not in tokens:
                  tokens.append(normalized)

          def escape_env_value(value):
              if not value:
                  return '""'
              if all(ch.isalnum() or ch in '_./:@-' for ch in value):
                  return value
              return '"' + value.replace('\\', '\\\\').replace('"', '\\"').replace('\n', '\\n') + '"'

          values = parse_env(existing)
          collected_tokens = []
          add_token(collected_tokens, values.get('MOBILE_SHARED_TOKEN', ''))
          for token in split_tokens(values.get('MOBILE_SHARED_TOKENS', '')):
              add_token(collected_tokens, token)

          names = subprocess.check_output(
              ['docker', 'ps', '-a', '--filter', 'name=gateway-chat-platform', '--format', '{{.Names}}'],
              text=True,
          ).splitlines()

          containers_with_tokens = 0
          for name in names:
              data = json.loads(subprocess.check_output(['docker', 'inspect', name], text=True))[0]
              container_env = {}
              for entry in data.get('Config', {}).get('Env', []) or []:
                  if '=' in entry:
                      key, value = entry.split('=', 1)
                      container_env[key] = value
              before = len(collected_tokens)
              add_token(collected_tokens, container_env.get('MOBILE_SHARED_TOKEN', ''))
              for token in split_tokens(container_env.get('MOBILE_SHARED_TOKENS', '')):
                  add_token(collected_tokens, token)
              if len(collected_tokens) > before:
                  containers_with_tokens += 1

          if not collected_tokens:
              raise SystemExit('No non-empty mobile bearer tokens found in shared env or existing gateway-chat-platform containers')

          primary_token = collected_tokens[0]
          rotation_tokens = [token for token in collected_tokens[1:] if token != primary_token]
          recovered = {
              'MOBILE_SHARED_TOKEN': primary_token,
              'MOBILE_SHARED_TOKENS': ','.join(rotation_tokens),
          }

          lines = existing.splitlines()
          seen = set()
          updated = []
          for line in lines:
              if '=' not in line or line.startswith('#'):
                  updated.append(line)
                  continue
              key, _ = line.split('=', 1)
              if key in recovered:
                  updated.append(f'{key}={escape_env_value(recovered[key])}')
                  seen.add(key)
              else:
                  updated.append(line)
          for key, value in recovered.items():
              if key not in seen:
                  updated.append(f'{key}={escape_env_value(value)}')

          env_path.write_text('\n'.join(updated).rstrip() + '\n')
          print(f'Merged {len(collected_tokens)} mobile bearer token(s) from shared env and {containers_with_tokens} container(s); values not logged')
          PY
      - name: Redeploy chat platform
        run: |
          REVISION="${{ inputs.chat_revision }}"
          if [ -n "$REVISION" ]; then
            /opt/gateway-control-plane/deploy/bin/deploy-app.sh --config /opt/gateway-control-plane/configs/gateway.config.json --app gateway-chat-platform --revision "$REVISION"
          else
            /opt/gateway-control-plane/deploy/bin/deploy-app.sh --config /opt/gateway-control-plane/configs/gateway.config.json --app gateway-chat-platform
          fi
      - name: Verify mobile bearer auth
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import urllib.request

          env_path = Path('/srv/apps/gateway-chat-platform/shared/chat-api.env')
          values = {}
          for line in env_path.read_text().splitlines():
              if not line or line.startswith('#') or '=' not in line:
                  continue
              key, value = line.split('=', 1)
              values[key] = value.strip().strip('"')
          tokens = []
          primary_token = values.get('MOBILE_SHARED_TOKEN', '').strip()
          if primary_token:
              tokens.append(primary_token)
          for token in values.get('MOBILE_SHARED_TOKENS', '').split(','):
              token = token.strip()
              if token and token not in tokens:
                  tokens.append(token)
          if not tokens:
              raise SystemExit('No mobile bearer tokens are configured after recovery')

          config = json.loads(Path('/opt/gateway-control-plane/configs/gateway.config.json').read_text())
          app = next(app for app in config['apps'] if app['id'] == 'gateway-chat-platform')
          slot = Path('/srv/apps/gateway-chat-platform/current-slot').read_text().strip()
          port = app['slots'][slot]['port']
          for index, token in enumerate(tokens, start=1):
              request = urllib.request.Request(
                  f'http://127.0.0.1:{port}/api/session/me',
                  headers={
                      'Authorization': f'Bearer {token}',
                      'X-Gateway-Client-Platform': 'ios',
                  },
              )
              with urllib.request.urlopen(request, timeout=10) as response:
                  if response.status != 200:
                      raise SystemExit(f'Mobile bearer verification failed for configured token #{index} with HTTP {response.status}')
          print(f'Mobile bearer verification passed for {len(tokens)} configured token(s); values not logged')
          PY