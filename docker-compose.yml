services:
  gateway-control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-4173}:4173"
    volumes:
      - "${GATEWAY_CONFIG_PATH:-./configs/gateway.config.json}:/config/gateway.config.json"
      - "${GATEWAY_BUILD_OUT_DIR:-./generated}:/data/generated"
      - "${GATEWAY_SSH_DIR:-/home/deploy/.ssh}:/root/.ssh:ro"
    networks:
      - default
      - agent-service

networks:
  default:
  agent-service:
    # Join the agent-service compose project's default network so the
    # control-plane can reach agent-service:8080 by container DNS name.
    # The network is created (and survives) independently by the
    # agent-service stack; we attach as an external participant here.
    external: true
    name: agent-service_default
